name: Good Morning, Vietnam

on:
  schedule:
    # I tick schedulati NON sono la copertura primaria (GitHub li ritarda/salta
    # sotto carico, a volte per ore). Servono da RETE DI SICUREZZA e da STAFFETTA:
    # mentre un run tiene la finestra calda con un loop interno (~6h, vedi sotto),
    # ogni tick resta in coda grazie a `concurrency` e fa ripartire il loop
    # all'istante quando quello in corso finisce (o se mai si interrompe).
    # Sfasati dal minuto 0 (2,7,...,57) come consiglia GitHub.
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: good-morning
  cancel-in-progress: false

jobs:
  good-morning:
    runs-on: ubuntu-latest
    # ~6h e' il tetto massimo di un job: restiamo appena sotto. Il loop esce a
    # 345 min e lascia il testimone al run schedulato rimasto in coda.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep the 5h window warm (check ogni 5 min dentro lo stesso run)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set +e  # un errore transitorio (rete/API/push) non deve fermare il loop
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # La cadenza "ogni 5 minuti" e' garantita QUI DENTRO con sleep, quindi
          # non dipende dallo scheduler di GitHub. Lo script decide ogni giro se
          # inviare il buongiorno (finestra scaduta) o uscire subito (attiva).
          deadline=$(( $(date +%s) + 345 * 60 ))
          while :; do
            echo "::group::check $(date -u +%H:%M:%S)Z"
            python automation/good_morning.py
            # Persisti lo stato solo quando cambia (~1 volta ogni finestra 5h),
            # cosi' i run schedulati di riserva sanno quando scade la finestra.
            if ! git diff --quiet automation/state.json; then
              cp automation/state.json /tmp/state.json
              git fetch origin main
              git reset --hard origin/main
              cp /tmp/state.json automation/state.json
              git add automation/state.json
              git commit -m "chore: update window reset state [skip ci]"
              git push
            fi
            echo "::endgroup::"
            [ "$(date +%s)" -ge "$deadline" ] && break
            sleep 300
          done
