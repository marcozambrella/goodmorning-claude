name: Good Morning, Vietnam

on:
  schedule:
    # ATTENZIONE: GitHub NON garantisce la cadenza dei cron schedulati. Sotto
    # carico vengono spesso ritardati o saltati, a volte per ore (peggio al
    # minuto 0 di ogni ora). Per questo chiediamo un check ogni ~5 minuti,
    # sfasato dall'ora tonda (minuti 2,7,...,57) come consiglia GitHub, cosi'
    # da ridurre i buchi in cui la finestra 5h e' scaduta ma non ancora
    # riavviata. Lo script decide da solo se inviare o uscire subito: la
    # cadenza effettiva resta dinamica (~ogni 5h dall'ultima sessione).
    # Copertura garantita -> vedi README: trigger esterno via workflow_dispatch.
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: good-morning
  cancel-in-progress: false

jobs:
  good-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run good morning automation
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python automation/good_morning.py

      - name: Persist state
        run: |
          if ! git diff --quiet automation/state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            cp automation/state.json /tmp/state.json
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/state.json automation/state.json
            git add automation/state.json
            git commit -m "chore: update window reset state [skip ci]"
            git push
          fi
